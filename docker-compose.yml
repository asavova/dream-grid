services:
  python-analysis:
    build:
      context: .
      dockerfile: python/Dockerfile
    container_name: dreamgrid-python-analysis
    environment:
      DREAMGRID_ANALYSIS_HOST: 0.0.0.0
      DREAMGRID_ANALYSIS_PORT: 5005
      DREAMGRID_ANALYSIS_BACKEND: rule-based
    ports:
      - "5005:5005"

  java-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dreamgrid-java-backend
    depends_on:
      - python-analysis
    environment:
      DREAMGRID_SERVER_HOST: 0.0.0.0
      DREAMGRID_SERVER_PORT: 8080
      DREAMGRID_ANALYSIS_BASE_URL: http://python-analysis:5005
      DREAMGRID_DATABASE_PATH: /app/data/dreams.db
    ports:
      - "8080:8080"
    volumes:
      - dreamgrid_data:/app/data

volumes:
  dreamgrid_data:
